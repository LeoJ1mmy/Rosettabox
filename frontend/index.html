<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>RosettaBox</title>
    <script>
      // Apply theme before React renders to prevent FOUC (Flash of Unstyled Content)
      (function() {
        var theme = localStorage.getItem('voice_processor_theme') || 'light';
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
