[program:voice-text-processor-frontend]
command=npm run dev
directory=%(here)s/../frontend
environment=VITE_PORT=5175,PORT=5175
stdout_logfile=%(here)s/../logs/frontend.log
stderr_logfile=%(here)s/../logs/frontend_error.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
stderr_logfile_maxbytes=50MB
stderr_logfile_backups=10
autostart=false
autorestart=true
startsecs=5
stopwaitsecs=10
stopasgroup=true
killasgroup=true
redirect_stderr=false
